name: Deployment pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches: [main]
    types: [opened, synchronize]
jobs:
  simple_deployment_pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: Install dependencies
        run: npm install
      - name: Check style
        run: npm run eslint
      - name: Test
        run: npm test
      - name: Build
        run: npm run build

  notify_failure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses:
          actions/setup-node@v6
          # Send Discord Notification when the build is failure
      - name: Build failure notification
        uses: sarisia/actions-status-discord@v1.16.0
        if: ${{ failure() }}
        with:
          webhook: ${{ secrets.FS_DISCORD_WEBHOOK }}
          content: '❌Build Failed!'
          title: 'Failure Details'
          description: |
            **Repository**: `${{ github.repository }}`
            **Branch**: `${{ github.base_ref }}`
            **Commit**: `${{ github.sha }}`
            **Message**: `${{ github.event.pull_request.title }}`
            **Author**: `${{ github.actor }}`
            **Workflow**: `${{ github.workflow }}`
            **Job**: `${{ github.job }}`

  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Run Playwright tests
        run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Trigger deployment
        # Need to config it so that if a commit message contain #skip, it is not deployed
        if: ${{ !contains(join(github.event.commits.*.message), '#skip') && github.event_name == 'push'}}
        run: curl ${{ secrets.RENDER_DEPLOY_HOOK }}

  notify_success:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
      # Send Discord notification
      - name: Successful Deployment Discord Notification
        uses: sarisia/actions-status-discord@v1.16.0
        if: ${{ success() }}
        with:
          webhook: ${{ secrets.FS_DISCORD_WEBHOOK }}
          content: '✅Deployment Successful!'
          title: 'Deployment Details'
          description: |
            **Commit**: `${{ github.sha }}`
            **Message**: `${{ github.event.pull_request.title }}`
            **Author**: `${{ github.actor }}`
          nodetail: true

  tag_release:
    needs: [simple_deployment_pipeline]
    runs-on: ubuntu-latest
    steps:
      # Check out the current repo first !important
      - uses: actions/checkout@v6
      - name: Bump version and push tag
        if: ${{ !contains(join(github.event.commits.*.message), '#skip') && github.event_name == 'push'}}
        uses: anothrNick/github-tag-action@4ed44965e0db8dab2b466a16da04aec3cc312fd8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BUMP: patch
