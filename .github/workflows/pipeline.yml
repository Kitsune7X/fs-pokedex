name: Deployment pipeline

on:
  push:
    branches:
      - main
jobs:
  simple_deployment_pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: Install dependencies
        working-directory: ./fs-pokedex
        run: npm install
      - name: Check style
        working-directory: ./fs-pokedex
        run: npm run eslint
      - name: Test
        working-directory: ./fs-pokedex
        run: npm test
      - name: Build
        working-directory: ./fs-pokedex
        run: npm run build